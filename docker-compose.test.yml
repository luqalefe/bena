###############################################################################
# Override de CI / TESTES.
# Usado com:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm app \
#     sh -c "composer install --no-interaction --prefer-dist && ./vendor/bin/pint --test && php artisan test"
#
# Em CI:
#   - Sem Oracle (testes usam SQLite in-memory via phpunit.xml)
#   - Sem nginx (não há HTTP — apenas execução da suíte)
#   - Apenas a imagem 'app' é construída e roda a suíte
###############################################################################

services:
  oracle:
    profiles: ["never"]
    deploy: { replicas: 0 }

  nginx:
    profiles: ["never"]
    deploy: { replicas: 0 }

  app:
    environment:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
    depends_on: !reset []
    command:
      - sh
      - -c
      - "composer install --no-interaction --prefer-dist && ./vendor/bin/pint --test && php artisan test"
