###############################################################################
# Override de PRODUÇÃO.
# Usado com:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Diferenças em relação ao dev:
#   - Sem container Oracle (conecta no Oracle externo do tribunal)
#   - Sem bind mount do código (imagem self-contained, código copiado via Dockerfile)
#   - Em produção, Authelia + reverse proxy (Traefik/nginx do tribunal) são
#     externos a este compose. Eles ficam à frente do nginx daqui e injetam
#     os headers Remote-* lidos pelo middleware AutheliaAuth.
###############################################################################

services:
  oracle:
    profiles: ["never"]   # não sobe em prod
    deploy:
      replicas: 0

  app:
    volumes: !reset []   # imagem self-contained
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      AUTHELIA_DEV_BYPASS: "false"
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-1521}
      DB_SERVICE_NAME: ${DB_SERVICE_NAME}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on: !reset []

  nginx:
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
