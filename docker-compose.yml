services:
  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ponto-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - ponto-network
    depends_on:
      oracle:
        condition: service_healthy

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: ponto-nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ponto-network
    depends_on:
      - app

  # Oracle Database
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: ponto-oracle
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: secret
      APP_USER: ponto
      APP_USER_PASSWORD: secret
    ports:
      - "1523:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - ponto-network
    healthcheck:
      test: [ "CMD", "healthcheck.sh" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

networks:
  ponto-network:
    driver: bridge

volumes:
  oracle-data:
    driver: local
