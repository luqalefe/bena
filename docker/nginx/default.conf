# Nginx vhost — serves Laravel public/ and proxies PHP to the app container.

server {
    listen 80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 32M;

    # Security headers — Traefik will also set its own; these are belt-and-suspenders.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Block hidden files except .well-known.
    location ~ /\.(?!well-known).* { deny all; }

    # Long-lived static assets.
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 60s;
    }

    # Healthcheck endpoint for the nginx container itself.
    location = /__health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
